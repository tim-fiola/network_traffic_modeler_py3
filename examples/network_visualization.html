<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pyNTM Interactive Network Visualization</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; overflow: hidden; }

  #network-container {
    width: 100vw;
    height: 100vh;
  }

  #legend {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(30, 30, 50, 0.92);
    border: 1px solid #444;
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 13px;
    z-index: 10;
    backdrop-filter: blur(6px);
  }
  #legend h3 {
    margin-bottom: 8px;
    font-size: 14px;
    color: #ccc;
    border-bottom: 1px solid #444;
    padding-bottom: 4px;
  }

  #controls {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(30, 30, 50, 0.92);
    border: 1px solid #444;
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 13px;
    z-index: 10;
    backdrop-filter: blur(6px);
  }
  #controls h3 {
    margin-bottom: 8px;
    font-size: 14px;
    color: #ccc;
    border-bottom: 1px solid #444;
    padding-bottom: 4px;
  }
  #controls label {
    display: block;
    margin: 6px 0;
    cursor: pointer;
  }
  #controls button {
    margin-top: 8px;
    padding: 5px 12px;
    background: #334;
    color: #ddd;
    border: 1px solid #555;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  #controls button:hover { background: #445; }

  #info-panel {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: rgba(30, 30, 50, 0.92);
    border: 1px solid #444;
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 13px;
    z-index: 10;
    max-width: 500px;
    backdrop-filter: blur(6px);
    display: none;
  }
  #info-panel h3 {
    margin-bottom: 6px;
    font-size: 14px;
    color: #ccc;
  }
  #info-panel table {
    border-collapse: collapse;
    width: 100%;
  }
  #info-panel td {
    padding: 2px 10px 2px 0;
  }
  #info-panel .label-cell {
    color: #999;
  }
</style>
</head>
<body>

<div id="network-container"></div>

<div id="legend">
  <h3>Utilization</h3>
  <div style='display:flex;align-items:center;margin:3px 0;'><div style='width:30px;height:4px;background:#4169E1;margin-right:8px;border-radius:2px;'></div><span>0-24%</span></div><div style='display:flex;align-items:center;margin:3px 0;'><div style='width:30px;height:4px;background:#228B22;margin-right:8px;border-radius:2px;'></div><span>25-49%</span></div><div style='display:flex;align-items:center;margin:3px 0;'><div style='width:30px;height:4px;background:#FFD700;margin-right:8px;border-radius:2px;'></div><span>50-74%</span></div><div style='display:flex;align-items:center;margin:3px 0;'><div style='width:30px;height:4px;background:#FF4500;margin-right:8px;border-radius:2px;'></div><span>75-89%</span></div><div style='display:flex;align-items:center;margin:3px 0;'><div style='width:30px;height:4px;background:#8B0000;margin-right:8px;border-radius:2px;'></div><span>90-99%</span></div><div style='display:flex;align-items:center;margin:3px 0;'><div style='width:30px;height:4px;background:#9400D3;margin-right:8px;border-radius:2px;'></div><span>100%+</span></div><div style='display:flex;align-items:center;margin:3px 0;'><div style='width:30px;height:4px;background:#696969;margin-right:8px;border-radius:2px;border-top:2px dashed #696969;background:none;'></div><span>Failed</span></div>
</div>

<div id="controls">
  <h3>Controls</h3>
  <label><input type="checkbox" id="toggle-physics"> Enable physics</label>
  <label><input type="checkbox" id="toggle-labels" checked> Show edge arrows</label>
  <button id="btn-fit">Fit to screen</button>
  <button id="btn-reset">Reset positions</button>
</div>

<div id="info-panel">
  <h3 id="info-title"></h3>
  <div id="info-body"></div>
</div>

  var container = document.getElementById('network-container');
  var data = { nodes: nodes, edges: edges };

  var options = {
    physics: {
      enabled: false
    },
    interaction: {
      hover: true,
      tooltipDelay: 150,
      zoomView: true,
      dragView: true,
      dragNodes: true,
      multiselect: true
    },
    edges: {
      font: { size: 10, color: '#999', face: 'arial' },
      smooth: {
        type: 'curvedCW',
        roundness: 0.2
      },
      hoverWidth: 1.5
    },
    nodes: {
      font: { color: '#eeeeee' }
    }
  };

  var network = new vis.Network(container, data, options);

  // Store original positions for reset
  var originalPositions = {};
  nodesData.forEach(function(n) {
    originalPositions[n.id] = { x: n.x, y: n.y };
  });

  // --- Controls ---
  document.getElementById('toggle-physics').addEventListener('change', function() {
    network.setOptions({ physics: { enabled: this.checked } });
  });

  document.getElementById('toggle-labels').addEventListener('change', function() {
    var show = this.checked;
    var updates = [];
    edgesData.forEach(function(e, i) {
      updates.push({
        id: i + 1,
        arrows: { to: { enabled: show, scaleFactor: 0.8 } }
      });
    });
    // vis.js auto-assigns numeric IDs starting from 1
    edges.forEach(function(e) {
      edges.update({ id: e.id, arrows: { to: { enabled: show, scaleFactor: 0.8 } } });
    });
  });

  document.getElementById('btn-fit').addEventListener('click', function() {
    network.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
  });

  document.getElementById('btn-reset').addEventListener('click', function() {
    var updates = [];
    for (var id in originalPositions) {
      updates.push({ id: id, x: originalPositions[id].x, y: originalPositions[id].y });
    }
    nodes.update(updates);
    network.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
  });

  // --- Info Panel on click ---
  var infoPanel = document.getElementById('info-panel');
  var infoTitle = document.getElementById('info-title');
  var infoBody = document.getElementById('info-body');

  network.on('click', function(params) {
    if (params.nodes.length > 0) {
      var nodeId = params.nodes[0];
      var node = nodes.get(nodeId);
      infoTitle.textContent = 'Node: ' + node.label;
      infoBody.innerText = node.title || '';
      infoPanel.style.display = 'block';
    } else if (params.edges.length > 0) {
      var edgeId = params.edges[0];
      var edge = edges.get(edgeId);
      infoTitle.textContent = 'Interface';
      infoBody.innerText = edge.title || '';
      infoPanel.style.display = 'block';
    } else {
      infoPanel.style.display = 'none';
    }
  });

  // Initial fit
  network.once('afterDrawing', function() {
    network.fit({ animation: false });
  });
})();
</script>
</body>
</html>
