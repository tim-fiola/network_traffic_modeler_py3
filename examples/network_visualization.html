<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pyNTM Interactive Network Visualization</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #d2c6a5; color: #222; overflow: hidden; }

  #network-container {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    right: 320px;
  }

  /* --- Right sidebar --- */
  #sidebar {
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 320px;
    background: rgba(245, 240, 230, 0.97);
    border-left: 1px solid #aaa;
    overflow-y: auto;
    padding: 12px 14px;
    font-size: 13px;
    z-index: 20;
  }
  #sidebar h3 {
    font-size: 14px;
    color: #333;
    border-bottom: 1px solid #aaa;
    padding-bottom: 4px;
    margin: 14px 0 8px 0;
  }
  #sidebar h3:first-child { margin-top: 0; }
  #sidebar select {
    width: 100%;
    padding: 5px;
    margin: 4px 0 6px 0;
    background: #fff;
    color: #222;
    border: 1px solid #aaa;
    border-radius: 4px;
    font-size: 12px;
  }
  #sidebar button {
    padding: 4px 10px;
    background: #e8e4dc;
    color: #333;
    border: 1px solid #aaa;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    margin: 2px 4px 2px 0;
  }
  #sidebar button:hover { background: #d5d0c5; }
  #sidebar label {
    display: block;
    margin: 5px 0;
    cursor: pointer;
  }
  .path-info {
    margin-top: 6px;
    padding: 6px 8px;
    background: rgba(0,0,0,0.05);
    border-radius: 4px;
    font-size: 12px;
    white-space: pre-wrap;
    max-height: 150px;
    overflow-y: auto;
  }

  /* --- Legend overlay --- */
  #legend {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(245, 240, 230, 0.95);
    border: 1px solid #aaa;
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 13px;
    z-index: 10;
    backdrop-filter: blur(6px);
  }
  #legend h3 {
    margin-bottom: 8px;
    font-size: 14px;
    color: #333;
    border-bottom: 1px solid #aaa;
    padding-bottom: 4px;
  }

  /* --- Info panel --- */
  #info-panel {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: rgba(245, 240, 230, 0.95);
    border: 1px solid #aaa;
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 13px;
    z-index: 10;
    max-width: 500px;
    backdrop-filter: blur(6px);
    display: none;
  }
  #info-panel h3 {
    margin-bottom: 6px;
    font-size: 14px;
    color: #ccc;
  }
</style>
</head>
<body>

<div id="network-container"></div>

<div id="sidebar">
  <h3>Controls</h3>
  <label><input type="checkbox" id="toggle-physics"> Enable physics</label>
  <label><input type="checkbox" id="toggle-labels" checked> Show edge arrows</label>
  <button id="btn-fit">Fit to screen</button>
  <button id="btn-reset">Reset positions</button>

  <h3>Demands</h3>
  <select id="demand-select">
    <option value="">-- Select a demand --</option>
  </select>
  <button id="btn-clear-demand">Clear</button>
  <div id="demand-info" class="path-info" style="display:none;"></div>

  <h3>RSVP LSPs</h3>
  <select id="lsp-select">
    <option value="">-- Select an LSP --</option>
  </select>
  <button id="btn-clear-lsp">Clear</button>
  <div id="lsp-info" class="path-info" style="display:none;"></div>

  <h3>Utilization Legend</h3>
  <div style='display:flex;align-items:center;margin:3px 0;'><div style='width:30px;height:4px;background:#4169E1;margin-right:8px;border-radius:2px;'></div><span>0-24%</span></div><div style='display:flex;align-items:center;margin:3px 0;'><div style='width:30px;height:4px;background:#228B22;margin-right:8px;border-radius:2px;'></div><span>25-49%</span></div><div style='display:flex;align-items:center;margin:3px 0;'><div style='width:30px;height:4px;background:#FFD700;margin-right:8px;border-radius:2px;'></div><span>50-74%</span></div><div style='display:flex;align-items:center;margin:3px 0;'><div style='width:30px;height:4px;background:#FF4500;margin-right:8px;border-radius:2px;'></div><span>75-89%</span></div><div style='display:flex;align-items:center;margin:3px 0;'><div style='width:30px;height:4px;background:#8B0000;margin-right:8px;border-radius:2px;'></div><span>90-99%</span></div><div style='display:flex;align-items:center;margin:3px 0;'><div style='width:30px;height:4px;background:#9400D3;margin-right:8px;border-radius:2px;'></div><span>100%+</span></div><div style='display:flex;align-items:center;margin:3px 0;'><div style='width:30px;height:4px;background:#696969;margin-right:8px;border-radius:2px;border-top:2px dashed #696969;background:none;'></div><span>Failed</span></div>
</div>

<div id="legend" style="display:none;"></div>

<div id="info-panel">
  <h3 id="info-title"></h3>
  <div id="info-body"></div>
</div>

  var originalPositions = {};
  nodesData.forEach(function(n) {
    originalPositions[n.id] = { x: n.x, y: n.y };
  });

  // --- Populate dropdowns ---
  var demandSelect = document.getElementById('demand-select');
  demandsData.forEach(function(d, i) {
    var opt = document.createElement('option');
    opt.value = i;
    opt.textContent = d.label;
    demandSelect.appendChild(opt);
  });

  var lspSelect = document.getElementById('lsp-select');
  lspsData.forEach(function(l, i) {
    var opt = document.createElement('option');
    opt.value = i;
    opt.textContent = l.label;
    lspSelect.appendChild(opt);
  });

  // --- Highlight / restore helpers ---
  function restoreAllEdges() {
    var updates = [];
    edges.forEach(function(e) {
      var orig = originalEdgeStyles[e.id];
      if (orig) {
        updates.push({
          id: e.id,
          color: orig.color,
          width: orig.width,
          dashes: orig.dashes
        });
      }
    });
    edges.update(updates);
  }

  function restoreAllNodes() {
    var updates = [];
    nodes.forEach(function(n) {
      var orig = originalNodeStyles[n.id];
      if (orig) {
        updates.push({
          id: n.id,
          color: JSON.parse(JSON.stringify(orig.color)),
          borderWidth: orig.borderWidth
        });
      }
    });
    nodes.update(updates);
  }

  function dimAllEdges() {
    var updates = [];
    edges.forEach(function(e) {
      updates.push({
        id: e.id,
        color: { color: 'rgba(160,150,130,0.45)', highlight: 'rgba(160,150,130,0.45)' },
        width: 1
      });
    });
    edges.update(updates);
  }

  function highlightEdges(edgeIds, color, width) {
    var updates = [];
    edgeIds.forEach(function(eid) {
      updates.push({
        id: eid,
        color: { color: color, highlight: color },
        width: width,
        dashes: false
      });
    });
    edges.update(updates);
  }

  function highlightNodes(nodeIds, borderColor) {
    var updates = [];
    nodeIds.forEach(function(nid) {
      var orig = originalNodeStyles[nid];
      if (orig) {
        var c = JSON.parse(JSON.stringify(orig.color));
        c.border = borderColor;
        updates.push({ id: nid, color: c, borderWidth: 4 });
      }
    });
    nodes.update(updates);
  }

  // --- Demand selection ---
  demandSelect.addEventListener('change', function() {
    restoreAllEdges();
    restoreAllNodes();
    lspSelect.value = '';
    document.getElementById('lsp-info').style.display = 'none';
    var idx = this.value;
    var infoDiv = document.getElementById('demand-info');
    if (idx === '') {
      infoDiv.style.display = 'none';
      return;
    }
    var d = demandsData[parseInt(idx)];
    if (d.edge_ids.length === 0) {
      infoDiv.textContent = 'Demand is unrouted';
      infoDiv.style.display = 'block';
      return;
    }
    dimAllEdges();
    highlightEdges(d.edge_ids, DEMAND_COLOR, 5);
    highlightNodes(d.node_ids, DEMAND_COLOR);
    infoDiv.textContent = 'Path edges: ' + d.edge_ids.length + '\nNodes: ' + d.node_ids.join(', ');
    infoDiv.style.display = 'block';
  });

  document.getElementById('btn-clear-demand').addEventListener('click', function() {
    demandSelect.value = '';
    document.getElementById('demand-info').style.display = 'none';
    restoreAllEdges();
    restoreAllNodes();
  });

  // --- LSP selection ---
  lspSelect.addEventListener('change', function() {
    restoreAllEdges();
    restoreAllNodes();
    demandSelect.value = '';
    document.getElementById('demand-info').style.display = 'none';
    var idx = this.value;
    var infoDiv = document.getElementById('lsp-info');
    if (idx === '') {
      infoDiv.style.display = 'none';
      return;
    }
    var l = lspsData[parseInt(idx)];
    if (l.edge_ids.length === 0) {
      infoDiv.textContent = 'LSP is unrouted';
      infoDiv.style.display = 'block';
      return;
    }
    dimAllEdges();
    highlightEdges(l.edge_ids, LSP_COLOR, 5);
    highlightNodes(l.node_ids, LSP_COLOR);
    infoDiv.textContent = 'Path edges: ' + l.edge_ids.length + '\nNodes: ' + l.node_ids.join(', ');
    infoDiv.style.display = 'block';
  });

  document.getElementById('btn-clear-lsp').addEventListener('click', function() {
    lspSelect.value = '';
    document.getElementById('lsp-info').style.display = 'none';
    restoreAllEdges();
    restoreAllNodes();
  });

  // --- Controls ---
  document.getElementById('toggle-physics').addEventListener('change', function() {
    network.setOptions({ physics: { enabled: this.checked } });
  });

  document.getElementById('toggle-labels').addEventListener('change', function() {
    var show = this.checked;
    edges.forEach(function(e) {
      edges.update({ id: e.id, arrows: { to: { enabled: show, scaleFactor: 0.8 } } });
    });
  });

  document.getElementById('btn-fit').addEventListener('click', function() {
    network.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
  });

  document.getElementById('btn-reset').addEventListener('click', function() {
    var updates = [];
    for (var id in originalPositions) {
      updates.push({ id: id, x: originalPositions[id].x, y: originalPositions[id].y });
    }
    nodes.update(updates);
    network.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
  });

  // --- Info Panel on click ---
  var infoPanel = document.getElementById('info-panel');
  var infoTitle = document.getElementById('info-title');
  var infoBody = document.getElementById('info-body');

  network.on('click', function(params) {
    if (params.nodes.length > 0) {
      var nodeId = params.nodes[0];
      var node = nodes.get(nodeId);
      infoTitle.textContent = 'Node: ' + node.label;
      infoBody.innerText = node.title || '';
      infoPanel.style.display = 'block';
    } else if (params.edges.length > 0) {
      var edgeId = params.edges[0];
      var edge = edges.get(edgeId);
      infoTitle.textContent = 'Interface';
      infoBody.innerText = edge.title || '';
      infoPanel.style.display = 'block';
    } else {
      infoPanel.style.display = 'none';
    }
  });

  // Initial fit
  network.once('afterDrawing', function() {
    network.fit({ animation: false });
  });
})();
</script>
</body>
</html>
